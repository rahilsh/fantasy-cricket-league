spring:
  datasource:
    url: jdbc:h2:mem:fcl_test_${random.uuid};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  sql:
    init:
      mode: never
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

fcl:
  security:
    jwt:
      secret: test-secret-key-at-least-32-bytes-long-12345
