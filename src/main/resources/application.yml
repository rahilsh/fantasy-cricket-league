spring:
  application:
    name: fantasy-cricket-league
  datasource:
    url: ${FCL_DB_URL:jdbc:h2:file:./data/fcl;MODE=PostgreSQL;AUTO_SERVER=TRUE}
    username: ${FCL_DB_USERNAME:sa}
    password: ${FCL_DB_PASSWORD:}
    driver-class-name: ${FCL_DB_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  pattern:
    console: "ts=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%5p traceId=%X{traceId:-} logger=%logger{36} msg=%m%n"

fcl:
  security:
    superadmin:
      username: ${FCL_SECURITY_SUPERADMIN_USERNAME:fcl-admin}
      password: ${FCL_SECURITY_SUPERADMIN_PASSWORD:fcl-admin-password}
    jwt:
      secret: ${FCL_SECURITY_JWT_SECRET:change-me-to-a-long-secret-key-at-least-32-bytes}
