spring:
  application:
    name: fantasy-cricket-league
  datasource:
    url: ${FCL_DB_URL:jdbc:h2:file:./data/fcl;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${FCL_DB_USERNAME:sa}
    password: ${FCL_DB_PASSWORD:}
    driver-class-name: ${FCL_DB_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  sql:
    init:
      mode: never
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  pattern:
    console: "ts=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%5p traceId=%X{traceId:-} logger=%logger{36} msg=%m%n"
